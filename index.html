<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        try {
          var theme = localStorage.getItem("theme");
          if (
            theme === "dark" ||
            (theme !== "light" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches)
          ) {
            document.documentElement.classList.add("dark");
          }
        } catch (_) {}
      })();
    </script>
    <link
      rel="icon"
      type="image/svg+xml"
      href="%BASE_URL%app-icon-light.svg"
      media="(prefers-color-scheme: light)"
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="%BASE_URL%app-icon-dark.svg"
      media="(prefers-color-scheme: dark)"
    />
    <link rel="apple-touch-icon" href="%BASE_URL%app-icon-dark.svg" />
    <meta
      name="theme-color"
      content="#edf2f4"
      media="(prefers-color-scheme: light)"
    />
    <meta
      name="theme-color"
      content="#2b2d42"
      media="(prefers-color-scheme: dark)"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pdeefy</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
